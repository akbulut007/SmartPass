<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPass | Legacy Redirect</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/approval.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/database.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/qr.js"></script>
  <script defer src="js/approval.js"></script>
  <script defer src="js/dashboard.js"></script>
  <script defer src="js/logs.js"></script>
  <script defer src="js/reports.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body class="approve-body">
  <main class="approve-shell">
    <section class="approve-panel glass-panel waiting">
      <div class="smartpass-logo">SmartPass</div>
      <p class="eyebrow">SmartPass</p>
      <h1>Redirecting</h1>
      <p id="legacyScanMessage">Opening approval...</p>
      <a id="legacyApproveLink" class="primary-btn approve-button" href="approve.html">Open Approval</a>
    </section>
  </main>
  <script>
    const session = new URLSearchParams(window.location.search).get("session");
    const approvalBaseUrl = "https://akbulut007.github.io/NFC1/approve.html";
    const target = session
      ? `${approvalBaseUrl}?session=${encodeURIComponent(session)}`
      : approvalBaseUrl;
    document.getElementById("legacyApproveLink").href = target;
    if (!session) {
      document.getElementById("legacyScanMessage").textContent = "Invalid approval request.";
    } else {
      window.location.replace(target);
    }
  </script>
</body>
</html>

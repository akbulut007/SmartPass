<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPass QR Access | Requests</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/requests.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/database.js"></script>
  <script defer src="js/cards-service.js"></script>
  <script defer src="js/logs-service.js"></script>
  <script defer src="js/messages-service.js"></script>
  <script defer src="js/requests-service.js"></script>
  <script defer src="js/sessions-service.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/user-auth.js"></script>
  <script defer src="js/admin-auth.js"></script>
  <script defer src="js/access-requests.js"></script>
  <script defer src="js/qr.js"></script>
  <script defer src="js/approval.js"></script>
  <script defer src="js/dashboard.js"></script>
  <script defer src="js/logs.js"></script>
  <script defer src="js/reports.js"></script>
  <script defer src="js/requests.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body data-page="requests">
  <aside class="sidebar">
    <a class="logo" href="dashboard.html"><span>QR</span>SmartPass</a>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="my-card.html">My Identity</a>
      <a href="users.html">Users</a>
      <a href="logs.html">Logs</a>
      <a href="reports.html">Reports</a>
      <a class="active" href="requests.html">Requests</a>
      <a href="security.html">Security</a>
    </nav>
    <button id="logoutBtn" class="ghost-btn">Logout</button>
  </aside>

  <main class="app-main">
    <header class="page-header"><div><p class="eyebrow">SmartPass</p><h1>Requests</h1></div><div id="sessionInfo" class="session-pill"></div></header>
    <section class="glass-panel table-panel">
      <div class="section-title"><h2>Access Code Requests</h2><button id="refreshRequestsBtn" class="ghost-btn">Refresh</button></div>
      <div class="admin-filter-bar">
        <input id="requestsSearchInput" type="search" placeholder="Search requests by name, email, type, status, or reason" autocomplete="off">
        <div id="requestsQuickFilters" class="quick-filter-group" aria-label="Request filters">
          <button class="filter-chip active" type="button" data-request-filter="all">All</button>
          <button class="filter-chip" type="button" data-request-filter="pending">Pending</button>
          <button class="filter-chip" type="button" data-request-filter="reviewed">Reviewed</button>
          <button class="filter-chip" type="button" data-request-filter="approved">Approved</button>
          <button class="filter-chip" type="button" data-request-filter="rejected">Rejected</button>
        </div>
        <span id="requestsResultCount" class="users-result-count">Showing 0 of 0 requests</span>
      </div>
      <p id="requestsMessage" class="form-message" aria-live="polite"></p>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Full Name</th><th>Email</th><th>Type</th><th>Reason</th><th>Status</th><th>Created At</th><th>Actions</th></tr></thead>
          <tbody id="requestsTable"></tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>

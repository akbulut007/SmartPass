<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPass | User Register</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/database.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/qr.js"></script>
  <script defer src="js/approval.js"></script>
  <script defer src="js/dashboard.js"></script>
  <script defer src="js/logs.js"></script>
  <script defer src="js/reports.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body data-page="register" class="auth-body">
  <main class="auth-shell compact-auth-shell">
    <section class="auth-visual">
      <div class="brand-mark">QR</div>
      <h1>User Registration</h1>
      <p>Create a SmartPass identity account.</p>
      <a class="admin-portal-link" href="admin-login.html">Admin Portal</a>
      <div class="signal-grid">
        <span></span><span></span><span></span><span></span>
      </div>
    </section>

    <section class="auth-card glass-panel">
      <form id="registerForm" class="auth-form active">
        <h2>Create User Account</h2>
        <p>Register a new user identity.</p>
        <label>Full Name
          <input type="text" id="registerName" required autocomplete="name" placeholder="Ada Lovelace">
        </label>
        <label>Email
          <input type="email" id="registerEmail" required autocomplete="email" placeholder="student@university.edu">
        </label>
        <label>Password
          <input type="password" id="registerPassword" required minlength="6" autocomplete="new-password" placeholder="Minimum 6 characters">
        </label>
        <label>Confirm Password
          <input type="password" id="registerConfirmPassword" required minlength="6" autocomplete="new-password" placeholder="Repeat password">
        </label>
        <button class="primary-btn" type="submit">Create Account</button>
        <div class="auth-links">
          <a href="user-login.html">Already registered?</a>
        </div>
      </form>

      <p id="authMessage" class="form-message" aria-live="polite"></p>
    </section>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPass QR Access | Logs</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/database.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/qr.js"></script>
  <script defer src="js/approval.js"></script>
  <script defer src="js/dashboard.js"></script>
  <script defer src="js/logs.js"></script>
  <script defer src="js/reports.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body data-page="logs">
  <aside class="sidebar">
    <a class="logo" href="dashboard.html"><span>QR</span>SmartPass</a>
    <nav>
      <a href="dashboard.html">Dashboard</a><a href="my-card.html">My Identity</a><a href="users.html">Users</a><a class="active" href="logs.html">Logs</a><a href="reports.html">Reports</a><a href="security.html">Security</a>
    </nav>
    <button id="logoutBtn" class="ghost-btn">Logout</button>
  </aside>
  <main class="app-main">
    <header class="page-header"><div><p class="eyebrow">SmartPass</p><h1>Logs</h1></div><div id="sessionInfo" class="session-pill"></div></header>
    <section class="glass-panel table-panel">
      <div class="section-title"><h2>Access Events</h2><button id="refreshLogsBtn" class="ghost-btn">Refresh</button></div>
      <div class="admin-filter-bar">
        <input id="logsSearchInput" type="search" placeholder="Search logs by name, email, UID, result, or device" autocomplete="off">
        <div id="logsQuickFilters" class="quick-filter-group" aria-label="Log filters">
          <button class="filter-chip active" type="button" data-log-filter="all">All</button>
          <button class="filter-chip" type="button" data-log-filter="approved">Approved</button>
          <button class="filter-chip" type="button" data-log-filter="rejected">Rejected</button>
          <button class="filter-chip" type="button" data-log-filter="login">Login</button>
          <button class="filter-chip" type="button" data-log-filter="blocked">Blocked</button>
        </div>
        <span id="logsResultCount" class="users-result-count">Showing 0 of 0 logs</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Time</th><th>Name</th><th>Email</th><th>UID</th><th>Event</th><th>Result</th><th>Device</th></tr></thead>
          <tbody id="logsTable"></tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>

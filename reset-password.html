<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPass | Reset Password</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/database.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body data-page="reset-password" class="auth-body">
  <main class="auth-shell compact-auth-shell">
    <section class="auth-visual">
      <div class="brand-mark">QR</div>
      <h1>Reset Password</h1>
      <p>Create a new password for your SmartPass account.</p>
      <a class="admin-portal-link" href="user-login.html">Back to Login</a>
      <div class="signal-grid">
        <span></span><span></span><span></span><span></span>
      </div>
    </section>

    <section class="auth-card glass-panel">
      <form id="resetPasswordForm" class="auth-form active" novalidate>
        <h2>New Password</h2>
        <p>Enter and confirm your new password.</p>
        <label>New Password
          <input type="password" id="newPassword" required autocomplete="new-password" placeholder="New password">
        </label>
        <label>Confirm Password
          <input type="password" id="confirmNewPassword" required autocomplete="new-password" placeholder="Confirm password">
        </label>
        <button class="primary-btn" type="submit">Update Password</button>
      </form>

      <p id="resetPasswordMessage" class="form-message" aria-live="polite"></p>
    </section>
  </main>
</body>
</html>

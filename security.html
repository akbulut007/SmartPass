<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPass QR Access | Security</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/database.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/qr.js"></script>
  <script defer src="js/approval.js"></script>
  <script defer src="js/dashboard.js"></script>
  <script defer src="js/logs.js"></script>
  <script defer src="js/reports.js"></script>
  <script defer src="js/security.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body data-page="security">
  <aside class="sidebar">
    <a class="logo" href="dashboard.html"><span>QR</span>SmartPass</a>
    <nav>
      <a href="dashboard.html">Dashboard</a><a href="my-card.html">My Identity</a><a href="users.html">Users</a><a href="logs.html">Logs</a><a href="reports.html">Reports</a><a class="active" href="security.html">Security</a>
    </nav>
    <button id="logoutBtn" class="ghost-btn">Logout</button>
  </aside>
  <main class="app-main">
    <header class="page-header">
      <div><p class="eyebrow">SmartPass</p><h1>Security Status</h1></div>
      <div id="sessionInfo" class="session-pill"></div>
    </header>
    <div class="section-title">
      <p id="securityLastChecked" class="helper-text">Last checked: -</p>
      <button id="refreshSecurityBtn" class="ghost-btn" type="button">Refresh</button>
    </div>
    <section class="security-grid">
      <article class="glass-panel security-status-card" data-security-check="personalAccessCode"><span class="status-dot neutral"></span><h2>Personal Access Code</h2><p>Loading</p></article>
      <article class="glass-panel security-status-card" data-security-check="adminPortal"><span class="status-dot neutral"></span><h2>Admin Portal</h2><p>Loading</p></article>
      <article class="glass-panel security-status-card" data-security-check="qrApproval"><span class="status-dot neutral"></span><h2>QR Approval</h2><p>Loading</p></article>
      <article class="glass-panel security-status-card" data-security-check="blockedUsers"><span class="status-dot neutral"></span><h2>Blocked Users</h2><p>Loading</p></article>
      <article class="glass-panel security-status-card" data-security-check="supabaseAuth"><span class="status-dot neutral"></span><h2>Supabase Auth</h2><p>Loading</p></article>
      <article class="glass-panel security-status-card" data-security-check="cloudDatabase"><span class="status-dot neutral"></span><h2>Cloud Database</h2><p>Loading</p></article>
    </section>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPass | Mobile Approval</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/approval.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/database.js"></script>
  <script defer src="js/cards-service.js"></script>
  <script defer src="js/logs-service.js"></script>
  <script defer src="js/requests-service.js"></script>
  <script defer src="js/sessions-service.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/user-auth.js"></script>
  <script defer src="js/admin-auth.js"></script>
  <script defer src="js/access-requests.js"></script>
  <script defer src="js/qr.js"></script>
  <script defer src="js/approval.js"></script>
  <script defer src="js/dashboard.js"></script>
  <script defer src="js/logs.js"></script>
  <script defer src="js/reports.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body data-page="approve" class="approve-body">
  <main class="approve-shell">
    <section class="approve-panel glass-panel waiting">
      <div class="smartpass-logo">SmartPass</div>
      <p class="eyebrow">Mobile Approval</p>
      <h1>Secure Login Approval</h1>
      <div class="approve-status-ring">
        <span id="approveStatusMark">...</span>
      </div>
      <div class="approve-session-box">
        <div><span>Full Name</span><strong id="mobileCardName">Loading</strong></div>
        <div><span>Email</span><strong id="mobileCardEmail">-</strong></div>
        <div><span>UID</span><strong id="mobileCardUid">-</strong></div>
        <div><span>Request Status</span><strong id="mobileSessionStatus">Loading</strong></div>
        <div><span>Time Remaining</span><strong id="mobileSessionCountdown">--:--</strong></div>
      </div>
      <strong id="mobileSessionId" hidden>-</strong>
      <p id="mobileApprovalMessage">Loading approval session...</p>
      <div id="approveActions" class="approve-actions" hidden>
        <button id="mobileApproveBtn" class="primary-btn approve-button" type="button">Approve</button>
        <button id="mobileRejectBtn" class="danger-btn approve-button" type="button">Reject</button>
      </div>
    </section>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPass | User Login</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/database.js"></script>
  <script defer src="js/cards-service.js"></script>
  <script defer src="js/logs-service.js"></script>
  <script defer src="js/requests-service.js"></script>
  <script defer src="js/sessions-service.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/user-auth.js"></script>
  <script defer src="js/admin-auth.js"></script>
  <script defer src="js/access-requests.js"></script>
  <script defer src="js/qr.js"></script>
  <script defer src="js/approval.js"></script>
  <script defer src="js/dashboard.js"></script>
  <script defer src="js/logs.js"></script>
  <script defer src="js/reports.js"></script>
  <script defer src="js/requests.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body data-page="user-login" class="auth-body">
  <main class="auth-shell compact-auth-shell">
    <section class="auth-visual">
      <div class="brand-mark">QR</div>
      <h1>SmartPass Access</h1>
      <p>Secure identity login for QR-based access control.</p>
      <a class="admin-portal-link" href="admin-login.html">Admin Login</a>
      <div class="signal-grid">
        <span></span><span></span><span></span><span></span>
      </div>
    </section>

    <section class="auth-card glass-panel">
      <form id="userLoginForm" class="auth-form active" novalidate>
        <h2>User Login</h2>
        <p>Sign in to continue.</p>
        <label>Email
          <input type="email" id="userLoginEmail" required autocomplete="email" placeholder="student@university.edu">
        </label>
        <label>Password
          <input type="password" id="userLoginPassword" required autocomplete="current-password" placeholder="Password">
        </label>
        <label>
          <span class="field-label-with-help">
            Personal Access Code
            <span class="access-code-help" tabindex="0" aria-label="This code is generated after registration and is required for future logins. Contact the administrator if you lose it.">
              ?
              <span class="access-code-tooltip" role="tooltip">This code is generated after registration and is required for future logins. Contact the administrator if you lose it.</span>
            </span>
          </span>
          <input type="password" id="personalAccessCode" class="code-input pin-input" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off" placeholder="Enter personal code">
        </label>
        <button class="primary-btn" type="submit">Login</button>
        <div class="auth-links">
          <a href="register.html">Create user account</a>
          <button class="link-button" type="button" data-open-access-request>Contact Support</button>
        </div>
      </form>

      <p id="authMessage" class="form-message" aria-live="polite"></p>
    </section>
  </main>
</body>
</html>

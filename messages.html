<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPass QR Access | My Messages</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/messages.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/database.js"></script>
  <script defer src="js/cards-service.js"></script>
  <script defer src="js/logs-service.js"></script>
  <script defer src="js/messages-service.js"></script>
  <script defer src="js/requests-service.js"></script>
  <script defer src="js/sessions-service.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/user-auth.js"></script>
  <script defer src="js/admin-auth.js"></script>
  <script defer src="js/access-requests.js"></script>
  <script defer src="js/qr.js"></script>
  <script defer src="js/approval.js"></script>
  <script defer src="js/dashboard.js"></script>
  <script defer src="js/logs.js"></script>
  <script defer src="js/reports.js"></script>
  <script defer src="js/requests.js"></script>
  <script defer src="js/messages.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body data-page="messages">
  <aside class="sidebar">
    <a class="logo" href="my-card.html"><span>QR</span>SmartPass</a>
    <nav>
      <a href="my-card.html">My Identity</a>
      <a class="active" href="messages.html">My Messages</a>
    </nav>
    <button id="logoutBtn" class="ghost-btn">Logout</button>
  </aside>

  <main class="app-main">
    <header class="page-header">
      <div>
        <p class="eyebrow">SmartPass</p>
        <h1>My Messages</h1>
      </div>
      <div id="sessionInfo" class="session-pill">Checking session...</div>
    </header>

    <section class="glass-panel messages-panel">
      <div class="section-title">
        <h2>Inbox</h2>
        <button id="refreshMessagesBtn" class="ghost-btn" type="button">Refresh</button>
      </div>
      <p id="messagesStatus" class="form-message" aria-live="polite"></p>
      <div id="messagesList" class="messages-list"></div>
    </section>
  </main>
</body>
</html>

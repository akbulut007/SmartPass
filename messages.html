<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPass | User Message Box</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/messages.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/database.js"></script>
  <script defer src="js/messages-service.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/messages.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body data-page="message-box" class="auth-body">
  <main class="message-box-shell">
    <section class="message-box-card glass-panel">
      <div class="message-box-header">
        <div>
          <p class="eyebrow">SmartPass</p>
          <h1>User Message Box</h1>
          <p>Read admin replies to your access and support requests.</p>
        </div>
        <a id="backToUserLoginLink" class="admin-portal-link" href="user-login.html">Back to User Login</a>
      </div>

      <form id="messageBoxLoginForm" class="message-box-login" novalidate>
        <label>Email
          <input type="email" id="messageBoxEmail" required autocomplete="email" placeholder="student@university.edu">
        </label>
        <label>Password
          <input type="password" id="messageBoxPassword" required autocomplete="current-password" placeholder="Password">
        </label>
        <button class="primary-btn" type="submit">Open Message Box</button>
      </form>

      <p id="messagesStatus" class="form-message" aria-live="polite"></p>
      <section id="messageInboxPanel" class="message-inbox-panel" hidden>
        <div class="section-title">
          <h2>Inbox</h2>
          <button id="refreshMessagesBtn" class="ghost-btn" type="button">Refresh</button>
        </div>
        <div id="messagesList" class="messages-list"></div>
      </section>
    </section>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPass | Admin Login</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/database.js"></script>
  <script defer src="js/cards-service.js"></script>
  <script defer src="js/logs-service.js"></script>
  <script defer src="js/requests-service.js"></script>
  <script defer src="js/sessions-service.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/user-auth.js"></script>
  <script defer src="js/admin-auth.js"></script>
  <script defer src="js/access-requests.js"></script>
  <script defer src="js/qr.js"></script>
  <script defer src="js/approval.js"></script>
  <script defer src="js/dashboard.js"></script>
  <script defer src="js/logs.js"></script>
  <script defer src="js/reports.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body data-page="admin-login" class="auth-body">
  <main class="auth-shell compact-auth-shell">
    <section class="auth-visual">
      <div class="brand-mark">QR</div>
      <h1>Administrator Access</h1>
      <p>Protected access for SmartPass operators.</p>
      <a class="admin-portal-link" href="user-login.html">User Login</a>
      <div class="signal-grid">
        <span></span><span></span><span></span><span></span>
      </div>
    </section>

    <section class="auth-card glass-panel">
      <form id="adminLoginForm" class="auth-form active" novalidate>
        <h2>Admin Login</h2>
        <p>Sign in to manage access.</p>
        <label>Email
          <input type="email" id="adminLoginEmail" required autocomplete="email" placeholder="admin@smartpass.local">
        </label>
        <label>Password
          <input type="password" id="adminLoginPassword" required autocomplete="current-password" placeholder="Password">
        </label>
        <label>Admin Access Code
          <input type="password" id="adminPersonalAccessCode" class="code-input pin-input" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off" placeholder="Enter admin access code">
        </label>
        <button class="primary-btn" type="submit">Admin Login</button>
      </form>

      <p id="authMessage" class="form-message" aria-live="polite"></p>
    </section>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPass QR Access | Reports</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/database.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/qr.js"></script>
  <script defer src="js/approval.js"></script>
  <script defer src="js/dashboard.js"></script>
  <script defer src="js/logs.js"></script>
  <script defer src="js/reports.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body data-page="reports">
  <aside class="sidebar">
    <a class="logo" href="dashboard.html"><span>QR</span>SmartPass</a>
    <nav>
      <a href="dashboard.html">Dashboard</a><a href="my-card.html">My Identity</a><a href="users.html">Users</a><a href="logs.html">Logs</a><a class="active" href="reports.html">Reports</a><a href="security.html">Security</a>
    </nav>
    <button id="logoutBtn" class="ghost-btn">Logout</button>
  </aside>
  <main class="app-main">
    <header class="page-header"><div><p class="eyebrow">SmartPass</p><h1>Reports</h1></div><div id="sessionInfo" class="session-pill"></div></header>
    <section class="stats-grid">
      <article class="metric-card granted"><p>Approved</p><strong id="reportApproved">0</strong></article>
      <article class="metric-card denied"><p>Rejected</p><strong id="reportRejected">0</strong></article>
      <article class="metric-card denied"><p>Blocked Users</p><strong id="reportBlocked">0</strong></article>
      <article class="metric-card"><p>Total Logs</p><strong id="reportTotalLogs">0</strong></article>
    </section>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPass QR Access | Dashboard</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/database.js"></script>
  <script defer src="js/cards-service.js"></script>
  <script defer src="js/logs-service.js"></script>
  <script defer src="js/requests-service.js"></script>
  <script defer src="js/sessions-service.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/user-auth.js"></script>
  <script defer src="js/admin-auth.js"></script>
  <script defer src="js/access-requests.js"></script>
  <script defer src="js/qr.js"></script>
  <script defer src="js/approval.js"></script>
  <script defer src="js/dashboard.js"></script>
  <script defer src="js/logs.js"></script>
  <script defer src="js/reports.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body data-page="dashboard">
  <aside class="sidebar">
    <a class="logo" href="dashboard.html"><span>QR</span>SmartPass</a>
    <nav>
      <a class="active" href="dashboard.html">Dashboard</a>
      <a href="my-card.html">My Identity</a>
      <a href="users.html">Users</a>
      <a href="logs.html">Logs</a>
      <a href="reports.html">Reports</a>
      <a href="security.html">Security</a>
    </nav>
    <button id="logoutBtn" class="ghost-btn">Logout</button>
  </aside>

  <main class="app-main">
    <header class="page-header">
      <div>
        <p class="eyebrow">SmartPass</p>
        <h1>Dashboard</h1>
      </div>
      <div id="sessionInfo" class="session-pill">Checking session...</div>
    </header>

    <section class="stats-grid dashboard-stats">
      <article class="metric-card"><p>Total Users</p><strong id="totalUsers">0</strong></article>
      <article class="metric-card"><p>Active Users</p><strong id="activeIdentities">0</strong></article>
      <article class="metric-card denied"><p>Blocked Users</p><strong id="blockedUsers">0</strong></article>
      <article class="metric-card granted"><p>Approved Sessions</p><strong id="approvedSessions">0</strong></article>
      <article class="metric-card denied"><p>Rejected Sessions</p><strong id="rejectedSessions">0</strong></article>
    </section>

    <section class="dashboard-feed">
      <article class="glass-panel">
        <div class="section-title">
          <h2>Latest Activity</h2>
          <a href="logs.html">View all</a>
        </div>
        <div id="recentApprovals" class="recent-list"></div>
      </article>
    </section>
  </main>
</body>
</html>
